<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Day Planner</title>

  <script>
    // 🔒 Protect page
    const email = localStorage.getItem('userEmail');
    if (!email) {
      alert('Please sign in first!');
      window.location.href = 'my_index.html';
    }
  </script>

  <style>
    body {
      font-family: Arial;
      background-color: #f3efff;
      text-align: center;
    }

    section {
      margin: 8px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    label {
      width: 80px;
      font-weight: bold;
    }

    textarea {
      width: 220px;
      padding: 5px;
    }

    button {
      background-color: #7e6ac1;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
    }

    button:hover {
      background-color: #a593e0;
    }
  </style>
</head>

<body>

  <h2>Day Planner</h2>
  <h4 id="current-date"></h4>
  <h4 id="welcome-message"></h4>

  <button onclick="logout()">Logout</button>

  <h3>Today's Schedule</h3>

  <div id="schedule"></div>

  <script>
    const times = [
      '6am','7am','8am','9am','10am','11am',
      '12pm','1pm','2pm','3pm','4pm','5pm',
      '6pm','7pm','8pm','9pm','10pm'
    ];

    const container = document.getElementById('schedule');

    // Generate schedule UI
    times.forEach(time => {
      const section = document.createElement('section');

      section.innerHTML = `
        <label>${time.toUpperCase()}</label>
        <textarea id="${time}"></textarea>
        <button onclick="saveTask('${time}')">Save</button>
      `;

      container.appendChild(section);
    });

    function saveTask(id) {
      const value = document.getElementById(id).value;
      localStorage.setItem(id, value);
      alert(`Saved: ${id.toUpperCase()}`);
    }

    function logout() {
      localStorage.removeItem('userEmail');
      window.location.href = 'my_index.html';
    }

    // Load saved data + welcome
    window.onload = () => {
      times.forEach(id => {
        const saved = localStorage.getItem(id);
        if (saved) document.getElementById(id).value = saved;
      });

      const email = localStorage.getItem('userEmail');
      if (email) {
        const name = email.split('@')[0];
        document.getElementById('welcome-message').textContent = `Welcome, ${name}!`;
      }

      const now = new Date();
      document.getElementById('current-date').textContent =
        now.toDateString();
    };
  </script>

</body>
</html>
